name: Build XR1710G YYH OC firmware

on:
  workflow_dispatch:
    inputs:
      clean_cache:
        description: "Wipe ccache/dl and rebuild toolchain from scratch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions: write-all

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      UPSTREAM_REPO: "https://github.com/YYH2913/openwrt.git"
      UPSTREAM_BRANCH: "xr1710g-6.18-integration"
      GH_TOKEN: ${{ github.token }}
      IMG_INC: ghcr.io/${{ github.repository_owner }}/xr1710g-yyh-oc:latest
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ccache
            dlcache
          key: openwrt-ccache-dl-${{ github.sha }}
          restore-keys: |
            openwrt-ccache-dl-

      - name: Wipe caches (optional)
        if: github.event.inputs.clean_cache == 'true'
        run: rm -rf ccache dlcache && mkdir -p ccache dlcache openwrt_bin logs

      - name: Start container
        run: |
          IMAGE="$IMG_INC"
          docker image inspect "$IMAGE" >/dev/null 2>&1 || IMAGE="ubuntu:24.04"
          mkdir -p ccache dlcache openwrt_bin logs
          docker run -dt --name DK \
            -v "$PWD/ccache":/ccache \
            -v "$PWD/dlcache":/dlcache \
            -v "$PWD/openwrt_bin":/bld/openwrt_bin \
            -v "$PWD":/workspace \
            "$IMAGE"

      # ================================================================
      # Phase 1: Prepare source (install deps, clone/update, patches,
      #          feeds, config, force kernel rebuild for OC patch)
      # ================================================================
      - name: Prepare source
        run: |
          docker exec -u 0 -i \
            -e UPSTREAM_REPO="${UPSTREAM_REPO}" \
            -e UPSTREAM_BRANCH="${UPSTREAM_BRANCH}" \
            DK bash -euxc '
            rm -rf /var/lib/apt/lists/*
            for i in 1 2 3; do apt-get update -qq && break; sleep 5; done
            apt-get upgrade -y --no-install-recommends || true
            apt-get install -y --no-install-recommends --fix-missing \
              build-essential clang flex bison g++ gawk \
              gettext git libncurses-dev libssl-dev python3-dev python3-setuptools \
              rsync swig unzip zlib1g-dev file wget curl ca-certificates \
              python3 python3-pip python3-venv libelf-dev libdw-dev \
              subversion mercurial cvs asciidoc w3m docbook-xsl xsltproc \
              automake autoconf libtool pkg-config cmake ninja-build \
              aria2 jq time ccache patch

            GO_VER="1.24.6"
            if ! go version 2>/dev/null | grep -q "go${GO_VER}"; then
              case "$(uname -m)" in x86_64) A=amd64;; *) A=arm64;; esac
              curl -fsSL "https://go.dev/dl/go${GO_VER}.linux-${A}.tar.gz" -o /tmp/go.tar.gz
              rm -rf /usr/lib/go && tar -C /usr/lib -xzf /tmp/go.tar.gz && rm /tmp/go.tar.gz
              ln -sf /usr/lib/go/bin/go /usr/local/bin/go
              ln -sf /usr/lib/go/bin/gofmt /usr/local/bin/gofmt
            fi
            export GOROOT=/usr/lib/go PATH="/usr/lib/go/bin:$PATH"
            mkdir -p /bld/openwrt_bin /bld/openwrt
            bash /workspace/scripts/prepare-source.sh
          '

      # ================================================================
      # Phase 2: Build (download + tools + toolchain + kernel + packages
      #          + install + image — all in one step with V=s on failure)
      # ================================================================
      - name: Build firmware
        run: |
          docker exec -u 0 -i DK bash -euxc '
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            export CCACHE_DIR=/ccache
            export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
            export CCACHE_NOHASHDIR=true
            export CCACHE_COMPILERCHECK=content
            ccache -M 5G; ccache -z

            J="-j$(($(nproc) * 2))"
            LOG=/workspace/logs

            # --- Download ---
            for a in 1 2 3; do
              make $J download > $LOG/01-download.log 2>&1 && break
              echo "Download attempt $a failed, retrying..."; sleep 10
            done || { make -j1 V=s download 2>&1 | tail -200; exit 1; }

            # --- Tools + Toolchain ---
            make $J tools/install > $LOG/02-tools.log 2>&1 || { tail -100 $LOG/02-tools.log; exit 1; }
            make $J toolchain/install > $LOG/03-toolchain.log 2>&1 || { tail -100 $LOG/03-toolchain.log; exit 1; }

            # --- Kernel (forced rebuild for OC patch) ---
            make $J target/linux/compile > $LOG/04-kernel.log 2>&1 || {
              echo "=== Kernel FAILED, V=s diagnostics ==="
              make -j1 V=s target/linux/compile 2>&1 | tail -300
              exit 1
            }

            # --- Packages ---
            make $J package/compile > $LOG/05-packages.log 2>&1 || {
              echo "=== Package compile FAILED, V=s diagnostics ==="
              make -j1 V=s package/compile 2>&1 | tail -300
              exit 1
            }
            make $J target/compile >> $LOG/05-packages.log 2>&1 || {
              echo "=== Target compile FAILED, V=s diagnostics ==="
              make -j1 V=s target/compile 2>&1 | tail -300
              exit 1
            }

            # --- Install + Image ---
            make $J package/install > $LOG/06-install.log 2>&1 || { tail -100 $LOG/06-install.log; exit 1; }
            make $J target/install >> $LOG/06-install.log 2>&1 || { tail -100 $LOG/06-install.log; exit 1; }

            # --- Verify image ---
            ls -lh bin/targets/airoha/an7581/*.itb
            echo "=== Build complete ==="
            ccache -s
          '

      # ================================================================
      # Phase 3: Publish (artifacts + release + save Docker image)
      # ================================================================
      - name: Collect & upload artifacts
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" openwrt_bin logs 2>/dev/null || true
          mkdir -p artifacts
          cp -v openwrt_bin/targets/airoha/an7581/*xr1710g* artifacts/ 2>/dev/null || true
          cp -v openwrt_bin/targets/airoha/an7581/*.manifest artifacts/ 2>/dev/null || true
          [ -d logs ] && { mkdir -p artifacts/logs; cp -v logs/*.log artifacts/logs/ 2>/dev/null || true; }
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xr1710g-yyh-oc-firmware-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish to GitHub Releases
        if: success()
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          cp -v openwrt_bin/targets/airoha/an7581/*xr1710g*.itb release-assets/ 2>/dev/null || true
          cp -v openwrt_bin/targets/airoha/an7581/*.manifest release-assets/ 2>/dev/null || true
          ls -lh release-assets/
          TAG="xr1710g-yyh-oc-$(date -u '+%Y%m%d-%H%M%S')"
          gh release create "${TAG}" release-assets/* \
            --title "XR1710G-YYH-OC $(date -u '+%Y-%m-%d %H:%M')" \
            --notes "ARM native build with OC + Argon + UPnP + v2ray-geo + WireGuard + i18n."
          echo "Release created: ${TAG}"

      - name: Save Docker image
        if: always()
        run: |
          docker exec DK bash -c 'cd /bld/openwrt 2>/dev/null && rm -rf bin feeds tmp' 2>/dev/null || true
          docker commit -a "xr1710g-yyh-oc-builder" -m "Build $(date -u '+%Y-%m-%d %H:%M')" DK "$IMG_INC"
          docker push "$IMG_INC" || true
          echo "Docker image saved"

# XR1710G-YYH-OC build configuration
# This file is fed to `make defconfig` after the upstream tree is cloned
# and the OC / txpower / theme / package patches are applied.
#
# Target: Airoha AN7581 / Econet XR1710G (UBI)
# Upstream: https://github.com/YYH2913/openwrt branch xr1710g-6.18-integration

# ---- Target / Device ----
CONFIG_TARGET_airoha=y
CONFIG_TARGET_airoha_an7581=y
CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y

# ---- Selective build (only user-requested packages + device defaults) ----
# CONFIG_ALL is NOT set — building every package in the feeds (3000+) causes:
#   1. golang1.26 host toolchain build failure on ARM runners
#   2. 5+ hour compile times
#   3. nftables-nojson recursive dependency (upstream feed bug)
# Instead, only the packages explicitly listed below (CONFIG_PACKAGE_*) and
# the device DEFAULT_PACKAGES (from an7581.mk, patched with Argon theme,
# UPnP, v2ray-geo) are built. This preserves ALL user-facing plugin
# functionality while avoiding broken/unnecessary host toolchain builds.
# CONFIG_ALL is not set
# CONFIG_ALL_KMODS is not set
# CONFIG_ALL_NONSHARED is not set

# ---- Explicitly disable known-broken upstream packages (NOT user plugins) ----
# nftables-nojson has a recursive dependency bug in the upstream feed
# (PACKAGE_nftables-nojson selects itself). nftables (with JSON) is still
# built and provides full functionality.
# CONFIG_PACKAGE_nftables-nojson is not set
# golang1.26 / golang-bootstrap are host build tools, not target plugins.
# v2ray-geoip/geosite are data-only packages and do NOT need golang.
# CONFIG_PACKAGE_golang is not set
# CONFIG_PACKAGE_golang1.26 is not set
# CONFIG_PACKAGE_golang-bootstrap is not set

# ---- Devel / advanced options (required by user) ----
CONFIG_DEVEL=y
CONFIG_TOOLCHAINOPTS=y
# ccache is enabled in the workflow (CCACHE_DIR=/ccache, mounted from
# the runner's bind-mount).  Setting it here makes `make defconfig`
# keep it on across runs, so the workflow no longer needs to sed-edit
# .config to flip the bit.
CONFIG_CCACHE=y

# ---- Kernel debug / BPF / cgroup / XDP options (required by user) ----
CONFIG_KERNEL_DEBUG_INFO=y
# CONFIG_KERNEL_DEBUG_INFO_REDUCED is not set
CONFIG_KERNEL_DEBUG_INFO_BTF=y
CONFIG_KERNEL_CGROUPS=y
CONFIG_KERNEL_BPF_SYSCALL=y
CONFIG_KERNEL_BPF_JIT=y
CONFIG_KERNEL_CGROUP_BPF=y
CONFIG_KERNEL_BPF_EVENTS=y
CONFIG_BPF_TOOLCHAIN_HOST=y
CONFIG_KERNEL_XDP_SOCKETS=y
CONFIG_PACKAGE_kmod-xdp-sockets-diag=y

# Extra BPF / eBPF helpers that the above options pull in on aarch64
# NOTE: kmod-bpf / kmod-cgroup-bpf are not standalone packages in this
# feed set — BPF kernel support is provided by the CONFIG_KERNEL_BPF_*
# options above (BPF_SYSCALL + BPF_JIT + CGROUP_BPF + BPF_EVENTS).
# The lines are kept for forward-compatibility; defconfig drops them
# silently if the packages are absent.
CONFIG_PACKAGE_kmod-bpf=y
CONFIG_PACKAGE_kmod-cgroup-bpf=y
CONFIG_PACKAGE_libbpf=y
CONFIG_PACKAGE_bpftool-full=y
CONFIG_PACKAGE_libelf=y
CONFIG_PACKAGE_libzstd=y

# ---- Overclock: default to performance governor (also enforced by patch 002) ----
# CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND is not set
CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_ONDEMAND=y

# ---- Busybox devmem (useful for OC / register debugging) ----
CONFIG_BUSYBOX_CUSTOM=y
CONFIG_BUSYBOX_CONFIG_DEVMEM=y
CONFIG_KERNEL_DEVMEM=y

# ---- Image options ----
# CONFIG_TARGET_ROOTFS_INITRAMFS is not set
# CONFIG_SIGN_EACH_PACKAGE is not set
# CONFIG_TARGET_ROOTFS_SQUASHFS is not set
CONFIG_TARGET_ROOTFS_SQUASHFS=y

# ---- Themes ----
# Explicitly drop Glass theme and its i18n packs
# CONFIG_PACKAGE_luci-theme-glass is not set
# CONFIG_PACKAGE_luci-i18n-glass-zh-cn is not set
# CONFIG_PACKAGE_luci-i18n-glass-de is not set
# CONFIG_PACKAGE_luci-i18n-glass-es is not set
# CONFIG_PACKAGE_luci-i18n-glass-fr is not set
# CONFIG_PACKAGE_luci-i18n-glass-ja is not set
# CONFIG_PACKAGE_luci-i18n-glass-ko is not set
# CONFIG_PACKAGE_luci-i18n-glass-ru is not set
# CONFIG_PACKAGE_luci-i18n-glass-zh-tw is not set

# Argon as default theme (also pinned by patch 003)
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-theme-bootstrap=y
CONFIG_PACKAGE_luci-i18n-argon-zh-cn=y

# ---- IPsec / XFRM (required by kmod-ixgbe → xfrm_algo.ko) ----
CONFIG_PACKAGE_kmod-ipsec=y

# ---- User-requested extra packages ----
CONFIG_PACKAGE_luci-app-upnp=y
CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
CONFIG_PACKAGE_miniupnpd-nftables=y
CONFIG_PACKAGE_v2ray-geoip=y
CONFIG_PACKAGE_v2ray-geosite=y

# ---- Keep upstream plugin set (do not disable anything the device ships) ----
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-app-firewall=y
CONFIG_PACKAGE_luci-app-mlo=y
CONFIG_PACKAGE_luci-app-package-manager=y
CONFIG_PACKAGE_luci-app-airoha-npu=y
CONFIG_PACKAGE_luci-i18n-mlo-zh-cn=y
CONFIG_PACKAGE_luci-mod-admin-full=y
CONFIG_PACKAGE_luci-proto-ppp=y
CONFIG_PACKAGE_luci-proto-ipv6=y
CONFIG_PACKAGE_rpcd-mod-rrdns=y
CONFIG_PACKAGE_uhttpd=y
CONFIG_PACKAGE_uhttpd-mod-ubus=y
CONFIG_PACKAGE_wpad-basic-mbedtls=y

# ---- OpenSSL options (match upstream w1700k/builds ubi2-oc config) ----
CONFIG_OPENSSL_ENGINE=y
CONFIG_OPENSSL_WITH_ASM=y
CONFIG_OPENSSL_WITH_CHACHA_POLY1305=y
CONFIG_OPENSSL_WITH_CMS=y
CONFIG_OPENSSL_WITH_DEPRECATED=y
CONFIG_OPENSSL_WITH_ERROR_MESSAGES=y
CONFIG_OPENSSL_WITH_IDEA=y
CONFIG_OPENSSL_WITH_MDC2=y
CONFIG_OPENSSL_WITH_PSK=y
CONFIG_OPENSSL_WITH_SEED=y
CONFIG_OPENSSL_WITH_SRP=y
CONFIG_OPENSSL_WITH_TLS13=y
CONFIG_OPENSSL_WITH_WHIRLPOOL=y

# ---- Build user / host info ----
CONFIG_KERNEL_BUILD_DOMAIN="buildhost"
CONFIG_KERNEL_BUILD_USER="builder"

# ---- Golang bootstrap (v2ray-geoip/geosite pull in a go toolchain) ----
CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT="/usr/lib/go/"
# CONFIG_GOLANG_BUILD_BOOTSTRAP is not set

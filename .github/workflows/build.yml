name: Build XR1710G YYH OC firmware

on:
  workflow_dispatch:
    inputs:
      clean_cache:
        description: "Wipe ccache and staging before building"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      verbose:
        description: "Verbose build output (V=c, shows every command)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions: write-all

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      DK_OPENWRT: /bld/openwrt
      DK_BIN: /bld/openwrt_bin
      UPSTREAM_REPO: "https://github.com/YYH2913/openwrt.git"
      UPSTREAM_BRANCH: "xr1710g-6.18-integration"
      GH_TOKEN: ${{ github.token }}
      IMG_INC: ghcr.io/${{ github.repository_owner }}/xr1710g-yyh-oc:latest
      # Note: we deliberately do NOT set a top-level JOBS env var.
      # Each build step uses `make -j$(($(nproc) * 2))` inline so the
      # parallelism is computed at the actual runner, not at the
      # workflow-evaluation time on GitHub's side.  This also means a
      # future switch to an 8/16-core runner picks up the extra cores
      # for free.

    steps:
      # ----------------------------------------------------------------
      # 0. Checkout overlay repo.
      # ----------------------------------------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Login to GHCR for Docker image caching.
      # ----------------------------------------------------------------
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # ----------------------------------------------------------------
      # 2. Seed caches from previous build's Docker image.
      # ----------------------------------------------------------------
      - name: Seed caches from previous build
        run: |
          set -eux
          mkdir -p ccache stcache dlcache openwrt_bin logs
          docker pull "$IMG_INC" 2>&- || true
          if docker image inspect "$IMG_INC" >/dev/null 2>&1; then
            docker create --name CA "$IMG_INC" >/dev/null
            for d in ccache stcache dlcache; do
              docker cp CA:/$d/. $d 2>/dev/null || true
            done
            docker rm CA
            echo "Restored caches from previous build image"
          else
            echo "No previous build image found, starting fresh"
          fi

      # ----------------------------------------------------------------
      # 3. Wipe caches if requested.
      # ----------------------------------------------------------------
      - name: Wipe caches (optional)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          set -eux
          rm -rf ccache stcache dlcache openwrt_bin logs
          mkdir -p ccache stcache dlcache openwrt_bin logs
          echo "Caches wiped"

      # ----------------------------------------------------------------
      # 4. Configure Docker daemon for speed.
      # ----------------------------------------------------------------
      - name: Configure Docker
        run: |
          sudo tee /etc/docker/daemon.json <<< '{"max-concurrent-downloads":50,"max-concurrent-uploads":50,"experimental":true}'
          sudo systemctl reload docker

      # ----------------------------------------------------------------
      # 5. Start Docker container with mounted caches.
      # ----------------------------------------------------------------
      - name: Start build container
        run: |
          set -eux
          IMAGE="$IMG_INC"
          docker image inspect "$IMAGE" >/dev/null 2>&1 || IMAGE="ubuntu:24.04"
          echo "Using image: $IMAGE"
          docker run -dt --name DK \
            -v "$PWD/ccache":/ccache \
            -v "$PWD/stcache":/stcache \
            -v "$PWD/dlcache":/dlcache \
            -v "$PWD/openwrt_bin":/bld/openwrt_bin \
            -v "$PWD":/workspace \
            "$IMAGE"
          echo "Container started"

      # ----------------------------------------------------------------
      # 6. Prepare OpenWrt source inside container.
      #    - installs build dependencies
      #    - installs Go >= 1.24.6 for the golang1.26 host feed
      #    - clones upstream YYH2913 xr1710g-6.18-integration
      #    - updates + installs all feeds
      #    - applies the six overlay patches
      #    - copies the OC config seed and runs `make defconfig`
      # ----------------------------------------------------------------
      - name: Prepare OpenWrt source
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            -e DK_BIN="${DK_BIN}" \
            -e UPSTREAM_REPO="${UPSTREAM_REPO}" \
            -e UPSTREAM_BRANCH="${UPSTREAM_BRANCH}" \
            -e GH_TOKEN="${GH_TOKEN}" \
            DK bash -euxc '
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              build-essential clang flex bison g++ gawk \
              gettext git libncurses-dev libssl-dev python3-dev python3-setuptools \
              rsync swig unzip zlib1g-dev file wget curl ca-certificates \
              python3 python3-pip python3-venv libelf-dev libdw-dev \
              subversion mercurial cvs asciidoc w3m docbook-xsl xsltproc \
              automake autoconf libtool pkg-config cmake ninja-build \
              aria2 jq time ccache patch

            # ---- Provide a Go >= 1.24.6 toolchain ----
            # OpenWrt ships a golang1.26 host feed whose dist bootstrap
            # refuses any Go below 1.24.6 (src/cmd/dist/notgo124.go).
            # Ubuntu 24.04 apt golang-go is Go 1.22, which trips that
            # gate.  .config points CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT
            # at /usr/lib/go, so we install a fresh official Go there.
            GO_BOOTSTRAP_VERSION="1.24.6"
            case "$(uname -m)" in
              x86_64)  GO_ARCH=amd64 ;;
              aarch64) GO_ARCH=arm64 ;;
              *)       GO_ARCH=arm64 ;;
            esac
            GO_TARBALL="go${GO_BOOTSTRAP_VERSION}.linux-${GO_ARCH}.tar.gz"
            curl -fsSL --retry 3 "https://go.dev/dl/${GO_TARBALL}" -o "/tmp/${GO_TARBALL}"
            rm -rf /usr/lib/go /usr/local/go
            tar -C /usr/lib -xzf "/tmp/${GO_TARBALL}"
            rm -f "/tmp/${GO_TARBALL}"
            ln -sf /usr/lib/go/bin/go    /usr/local/bin/go
            ln -sf /usr/lib/go/bin/gofmt /usr/local/bin/gofmt
            export GOROOT=/usr/lib/go
            export PATH="/usr/lib/go/bin:${PATH}"
            hash -r
            echo "Installed host Go for golang1.26 bootstrap:"
            go version
            test "$(go version | awk "{print \$3}")" = "go${GO_BOOTSTRAP_VERSION}"

            mkdir -p /bld/openwrt_bin
            rm -rf /bld/openwrt
            mkdir -p /bld/openwrt
            cd /bld/openwrt
            git clone --depth=1 --branch="$UPSTREAM_BRANCH" "$UPSTREAM_REPO" .
            git log -1 --format="Upstream HEAD: %H %s (%ci)"

            rm -rf bin dl staging_dir 2>/dev/null || true
            ln -sf /bld/openwrt_bin bin
            ln -sf /dlcache dl
            ln -sf /stcache staging_dir

            ./scripts/feeds update -a
            ./scripts/feeds install -a
            /workspace/scripts/apply-patches.sh /bld/openwrt
            cp /workspace/config/xr1710g-oc.conf .config
            make defconfig

            echo "=== Key config selections ==="
            grep -E "^CONFIG_TARGET|^CONFIG_PACKAGE_kmod-ipsec|^CONFIG_ALL|^CONFIG_CCACHE|^CONFIG_PACKAGE_luci-theme-argon" .config || true
          '

      # ----------------------------------------------------------------
      # 7. Download sources.  Parallel fetches shave a few minutes off
      #    the cold-cache path; on a warm dlcache this is near-instant.
      # ----------------------------------------------------------------
      - name: Download sources
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            -e UPSTREAM_REPO="${UPSTREAM_REPO}" \
            -e UPSTREAM_BRANCH="${UPSTREAM_BRANCH}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            mkdir -p /workspace/logs
            make -j$(($(nproc) * 2)) download V=s 2>&1 | tee /workspace/logs/01-download.log
          '

      # ----------------------------------------------------------------
      # 8. Build host tools.  Done as a separate step so an environment
      #    problem (missing apt package, broken Go install, etc.) shows
      #    up here instead of buried inside the main build log.
      # ----------------------------------------------------------------
      - name: Build host tools
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            make -j$(($(nproc) * 2)) tools/install V=s 2>&1 | tee /workspace/logs/02-tools.log
          '

      # ----------------------------------------------------------------
      # 9. Build cross-compile toolchain.  Same logic as tools: surface
      #    the error early instead of inside the big main-build step.
      # ----------------------------------------------------------------
      - name: Build cross-compile toolchain
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            make -j$(($(nproc) * 2)) toolchain/install V=s 2>&1 | tee /workspace/logs/03-toolchain.log
          '

      # ----------------------------------------------------------------
      # 10. Configure ccache.  The OC config seed already sets
      #     CONFIG_CCACHE=y, so the sed that used to flip it here is
      #     gone.  We just prime the cache size + stats.
      # ----------------------------------------------------------------
      - name: Configure ccache
        run: |
          docker exec -u 0 -i DK bash -c '
            set -euxo pipefail
            export CCACHE_DIR=/ccache
            export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
            export CCACHE_NOHASHDIR=true
            export CCACHE_COMPILERCHECK=content
            ccache -M 5G
            ccache -z
            ccache -s
          '

      # ----------------------------------------------------------------
      # 11. Compile kernel + modules.
      #     This is the slowest single stage (kernel is the bulk of the
      #     cold-cache cost).  We run it as its own step so the timing
      #     shows up in the Actions UI and a kernel failure is obvious.
      # ----------------------------------------------------------------
      - name: Compile kernel
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            export CCACHE_DIR=/ccache
            export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
            export CCACHE_NOHASHDIR=true
            export CCACHE_COMPILERCHECK=content
            make -j$(($(nproc) * 2)) target/linux/compile V=s 2>&1 | tee /workspace/logs/04-kernel-compile.log
          '

      # ----------------------------------------------------------------
      # 12. Compile + install packages.
      #     Splitting compile from install lets a package install
      #     failure (rootfs collision, missing postinst hook, etc.)
      #     show up distinctly from a compile failure.
      # ----------------------------------------------------------------
      - name: Compile packages
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            export CCACHE_DIR=/ccache
            export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
            export CCACHE_NOHASHDIR=true
            export CCACHE_COMPILERCHECK=content
            make -j$(($(nproc) * 2)) package/compile V=s 2>&1 | tee /workspace/logs/05-package-compile.log
            make -j$(($(nproc) * 2)) target/compile  V=s 2>&1 | tee -a /workspace/logs/05-package-compile.log
          '

      - name: Install packages
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            make -j$(($(nproc) * 2)) package/install V=s 2>&1 | tee /workspace/logs/06-package-install.log
            make -j$(($(nproc) * 2)) target/install  V=s 2>&1 | tee -a /workspace/logs/06-package-install.log
          '

      # ----------------------------------------------------------------
      # 13. Build rootfs + image.
      # ----------------------------------------------------------------
      - name: Build firmware image
        run: |
          docker exec -u 0 -i \
            -e DK_OPENWRT="${DK_OPENWRT}" \
            -e DK_BIN="${DK_BIN}" \
            DK bash -c '
            set -euxo pipefail
            cd /bld/openwrt
            export FORCE_UNSAFE_CONFIGURE=1
            make -j$(($(nproc) * 2)) package/rootfs V=s 2>&1 | tee /workspace/logs/07-rootfs.log
            make -j$(($(nproc) * 2)) target/image    V=s 2>&1 | tee /workspace/logs/08-image.log
            ccache -s
          '

      # ----------------------------------------------------------------
      # 14. Collect artifacts.
      #     Always runs, so the firmware + manifest + per-stage logs are
      #     available even if a later step blew up.  If the image step
      #     failed the logs are the only useful debug handle.
      # ----------------------------------------------------------------
      - name: Collect artifacts
        if: always()
        run: |
          set -eux
          sudo chown -R "$(id -u):$(id -g)" openwrt_bin stcache ccache dlcache logs 2>/dev/null || true
          mkdir -p artifacts
          {
            echo "Build date: $(date -u)"
            echo "Upstream repo: ${UPSTREAM_REPO}"
            echo "Upstream branch: ${UPSTREAM_BRANCH}"
            echo "Runner: $(uname -m)"
            echo "Verbose: ${{ github.event.inputs.verbose }}"
          } > artifacts/BUILD_INFO.txt
          cp -v openwrt_bin/targets/airoha/an7581/*xr1710g* artifacts/ 2>/dev/null || true
          cp -v openwrt_bin/targets/airoha/an7581/*.manifest artifacts/ 2>/dev/null || true
          # Per-stage logs are useful for post-mortem of any failure.
          if [ -d logs ] && ls logs/*.log >/dev/null 2>&1; then
            mkdir -p artifacts/logs
            cp -v logs/*.log artifacts/logs/ 2>/dev/null || true
          fi
          ls -la artifacts/

      # ----------------------------------------------------------------
      # 15. Upload artifacts.
      # ----------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-yyh-oc-firmware-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      # ----------------------------------------------------------------
      # 16. Publish to GitHub Releases (only on success).
      # ----------------------------------------------------------------
      - name: Publish to GitHub Releases
        if: success()
        run: |
          set -euxo pipefail
          sudo chown -R "$(id -u):$(id -g)" openwrt_bin
          mkdir -p release-assets
          cp -v openwrt_bin/targets/airoha/an7581/*xr1710g*.itb release-assets/ 2>/dev/null || true
          cp -v openwrt_bin/targets/airoha/an7581/*xr1710g*.bin release-assets/ 2>/dev/null || true
          cp -v openwrt_bin/targets/airoha/an7581/*.manifest release-assets/ 2>/dev/null || true
          if ! ls release-assets/*.itb release-assets/*.bin 2>/dev/null | grep -q .; then
            echo "ERROR: No firmware image found"
            exit 1
          fi
          TAG="xr1710g-yyh-oc-$(date -u '+%Y%m%d-%H%M%S')"
          gh release create "${TAG}" release-assets/* \
            --title "XR1710G-YYH-OC $(date -u '+%Y-%m-%d %H:%M')" \
            --notes "ARM native build. Upload *.itb via LuCI > System > Backup/Flash Firmware."
          echo "Release created: ${TAG}"

      # ----------------------------------------------------------------
      # 17. Save build state as Docker image for next run.
      # ----------------------------------------------------------------
      - name: Save build image
        if: always()
        run: |
          set -eux
          docker exec DK bash -c 'cd /bld/openwrt 2>/dev/null && rm -rf bin build_dir feeds tmp' 2>/dev/null || true
          docker commit -a "xr1710g-yyh-oc-builder" -m "Build $(date -u '+%Y-%m-%d %H:%M')" DK "$IMG_INC"
          docker push "$IMG_INC" || true
          echo "Build image saved"

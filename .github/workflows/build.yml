name: Build XR1710G YYH OC firmware

on:
  workflow_dispatch:
    inputs:
      clean_cache:
        description: "Wipe ccache and tmp/ before building (slower, fully clean)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: xr1710g-yyh-oc-build
  cancel-in-progress: false

env:
  UPSTREAM_REPO: "https://github.com/YYH2913/openwrt.git"
  UPSTREAM_BRANCH: "xr1710g-6.18-integration"
  MAKE_JOBS: "4"

permissions:
  contents: write

jobs:
  build:
    name: Full build
    runs-on: ubuntu-24.04
    timeout-minutes: 600

    steps:
      # ------------------------------------------------------------------
      # 0. Free disk space (OpenWrt builds need ~30 GB free).
      # ------------------------------------------------------------------
      - name: Free runner disk space
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell \
                      /usr/local/share/chrom* /usr/local/share/ripgrep \
                      /usr/local/share/vcpkg /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      # ------------------------------------------------------------------
      # 1. Checkout this overlay repo.
      # ------------------------------------------------------------------
      - name: Checkout overlay repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # 2. Install build dependencies (latest GCC on Ubuntu 24.04).
      # ------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-dev python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl ca-certificates \
            python3 python3-pip python3-venv libelf-dev libdw-dev \
            subversion mercurial cvs asciidoc w3m docbook-xsl xsltproc \
            automake autoconf libtool pkg-config cmake ninja-build \
            aria2 jq time ccache golang-go
          gcc --version
          df -h /

      # ------------------------------------------------------------------
      # 3. Restore ccache and dl/ caches for faster rebuilds.
      # ------------------------------------------------------------------
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ github.run_id }}
          restore-keys: ccache-

      - name: Restore dl cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: dlcache-${{ github.run_id }}
          restore-keys: dlcache-

      # ------------------------------------------------------------------
      # 4. Clone upstream OpenWrt source.
      # ------------------------------------------------------------------
      - name: Clone upstream OpenWrt source
        run: |
          set -eux
          git clone --depth=1 --branch="${UPSTREAM_BRANCH}" "${UPSTREAM_REPO}" openwrt
          cd openwrt
          git log -1 --format='Upstream HEAD: %H %s (%ci)'
          echo "UPSTREAM_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 5. Apply overlay patches (30dBm, OC, theme, packages, olddefconfig, argon feed).
      # ------------------------------------------------------------------
      - name: Apply overlay patches
        run: |
          set -eux
          cd openwrt
          ../scripts/apply-patches.sh "$PWD"
          # Verify olddefconfig patch was applied
          echo "=== Verify olddefconfig patch ==="
          grep -n "olddefconfig" include/kernel-defaults.mk || {
            echo "ERROR: olddefconfig patch not applied! Applying via sed fallback..."
            # Sed fallback: add olddefconfig after the .config.prev copy block
            sed -i '/cp \$(LINUX_DIR)\/.config.set \$(LINUX_DIR)\/.config.prev/a\\t# Resolve NEW kernel config symbols (e.g. IXGBE_IPSEC)\n\t$(KERNEL_MAKE) olddefconfig\n\tcp $(LINUX_DIR)/.config $(LINUX_DIR)/.config.set\n\tcp $(LINUX_DIR)/.config $(LINUX_DIR)/.config.prev' include/kernel-defaults.mk
            grep -n "olddefconfig" include/kernel-defaults.mk || { echo "FATAL: Cannot apply olddefconfig fix!"; exit 1; }
          }
          echo "olddefconfig patch verified OK"

      # ------------------------------------------------------------------
      # 6. Seed .config, update feeds (including argon), run defconfig.
      # ------------------------------------------------------------------
      - name: Seed and expand .config
        run: |
          set -eux
          cd openwrt
          # Copy the overlay config seed
          cp ../config/xr1710g-oc.conf .config
          # Update and install all feeds (including argon feed from patch 006)
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Run defconfig to expand the seed into a full .config
          make defconfig
          # Show key config selections for the log
          echo "=== final .config (key selections) ==="
          grep -E "^CONFIG_TARGET|^CONFIG_PACKAGE_luci|^CONFIG_PACKAGE_v2ray|^CONFIG_PACKAGE_miniupnpd|^CONFIG_PACKAGE_kmod-xdp|^CONFIG_KERNEL_DEBUG|^CONFIG_KERNEL_CGROUP|^CONFIG_KERNEL_BPF|^CONFIG_BPF_TOOLCHAIN|^CONFIG_KERNEL_XDP|^CONFIG_DEVEL|^CONFIG_CPU_FREQ_DEFAULT|^CONFIG_ALL" .config || true

      # ------------------------------------------------------------------
      # 7. Optional: wipe ccache and tmp/ for a fully clean build.
      # ------------------------------------------------------------------
      - name: Wipe caches (optional)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          set -eux
          cd openwrt
          rm -rf tmp/ .ccache
          ccache -C || true

      # ------------------------------------------------------------------
      # 8. Configure ccache.
      # ------------------------------------------------------------------
      - name: Configure ccache
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/.ccache"
          cd openwrt
          # Enable ccache in OpenWrt config
          sed -i 's/# CONFIG_CCACHE is not set/CONFIG_CCACHE=y/' .config
          # Set ccache dir to the cached path
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          ccache -M 5G
          ccache -z
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 9. Download all sources (dl/ tarballs).
      # ------------------------------------------------------------------
      - name: Download sources
        run: |
          set -euxo pipefail
          cd openwrt
          make -j"${MAKE_JOBS}" download V=s 2>&1 | tee download.log || {
            echo "=== Retrying download with -j1 ==="
            make -j1 download V=s 2>&1 | tee -a download.log
          }
          df -h /

      # ------------------------------------------------------------------
      # 10. Build the toolchain (this is the slow part, ccache helps here).
      # ------------------------------------------------------------------
      - name: Build toolchain
        run: |
          set -euxo pipefail
          cd openwrt
          export FORCE_UNSAFE_CONFIGURE=1
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPILERCHECK=content
          make -j"${MAKE_JOBS}" tools/install V=s 2>&1 | tee toolchain-tools.log
          make -j"${MAKE_JOBS}" toolchain/install V=s 2>&1 | tee toolchain-install.log
          ccache -s
          df -h /

      # ------------------------------------------------------------------
      # 11. Build the full target (kernel + rootfs + all packages).
      #     Two-pass: V=c (concise) first for speed, V=s (verbose) on failure.
      # ------------------------------------------------------------------
      - name: Build target (full)
        run: |
          set -euxo pipefail
          cd openwrt
          export FORCE_UNSAFE_CONFIGURE=1
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          export CCACHE_SLOPPINESS=file_stat_matches,include_file_mtime,time_macros
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPILERCHECK=content
          # First pass: concise output for speed
          make -j"${MAKE_JOBS}" V=c 2>&1 | tee build.log || {
            echo "=== First pass failed, retrying with V=s for detailed error ==="
            make -j1 V=s 2>&1 | tee -a build.log
          }
          ccache -s
          df -h /

      # ------------------------------------------------------------------
      # 12. Collect artifacts.
      # ------------------------------------------------------------------
      - name: Collect artifacts
        if: always()
        run: |
          set -eux
          mkdir -p artifacts
          {
            echo "Build date: $(date -u)"
            echo "Upstream repo: ${UPSTREAM_REPO}"
            echo "Upstream branch: ${UPSTREAM_BRANCH}"
            echo "Upstream commit: ${UPSTREAM_COMMIT}"
            echo "Overlay commit: ${GITHUB_SHA}"
          } > artifacts/BUILD_INFO.txt
          # Firmware images
          if ls openwrt/bin/targets/airoha/an7581/*xr1710g* 2>/dev/null; then
            cp -v openwrt/bin/targets/airoha/an7581/*xr1710g* artifacts/ 2>/dev/null || true
          fi
          # Manifest (package list)
          cp -v openwrt/bin/targets/airoha/an7581/*.manifest artifacts/ 2>/dev/null || true
          # Config snapshot
          cp -v openwrt/.config artifacts/full.config 2>/dev/null || true
          # Build log
          cp -v openwrt/build.log artifacts/ 2>/dev/null || true
          cp -v openwrt/toolchain-install.log artifacts/ 2>/dev/null || true
          ls -la artifacts/

      # ------------------------------------------------------------------
      # 13. Upload artifacts (always, even on failure).
      # ------------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-yyh-oc-firmware-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      # ------------------------------------------------------------------
      # 14. Publish firmware to GitHub Releases (only on success).
      # ------------------------------------------------------------------
      - name: Publish to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          cd openwrt
          mkdir -p release-assets
          # sysupgrade / factory / initramfs images for XR1710G
          cp -v bin/targets/airoha/an7581/*xr1710g*.itb release-assets/ 2>/dev/null || true
          cp -v bin/targets/airoha/an7581/*xr1710g*.bin release-assets/ 2>/dev/null || true
          # Manifest (package list for the image)
          cp -v bin/targets/airoha/an7581/*.manifest release-assets/ 2>/dev/null || true
          # Full .config snapshot
          cp -v .config release-assets/full.config 2>/dev/null || true
          # Build info
          {
            echo "## XR1710G-YYH-OC Firmware"
            echo ""
            echo "- **Build date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "- **Upstream:** ${UPSTREAM_REPO} (branch ${UPSTREAM_BRANCH})"
            echo "- **Upstream commit:** ${UPSTREAM_COMMIT}"
            echo "- **Overlay commit:** ${GITHUB_SHA}"
            echo "- **GitHub Actions run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "### Features"
            echo "- 30 dBm 5GHz UNII-1 txpower patch"
            echo "- 200 MHz OC + performance governor"
            echo "- Argon theme (replaces default Glass theme)"
            echo "- UPnP, v2ray-geoip, v2ray-geosite"
            echo "- BPF / eBPF / XDP / cgroup-BPF kernel support"
            echo "- CONFIG_ALL + CONFIG_ALL_KMODS (all packages built)"
            echo "- olddefconfig fix for NEW kernel symbols (IXGBE_IPSEC etc.)"
            echo "- ccache accelerated build"
            echo ""
            echo "### Install"
            echo "Upload the \`*.itb\` sysupgrade image via LuCI → System → Backup / Flash Firmware."
          } > release-assets/RELEASE_NOTES.md
          echo "=== Release assets ==="
          ls -la release-assets/
          # Verify at least one firmware image exists
          if ! ls release-assets/*.itb release-assets/*.bin 2>/dev/null | grep -q .; then
            echo "ERROR: No firmware image found in bin/targets/airoha/an7581/"
            ls -la bin/targets/airoha/an7581/ || true
            exit 1
          fi
          # Create tag and release
          TAG="xr1710g-yyh-oc-$(date -u '+%Y%m%d-%H%M%S')"
          gh release create "${TAG}" release-assets/* \
            --title "XR1710G-YYH-OC $(date -u '+%Y-%m-%d %H:%M')" \
            --notes-file release-assets/RELEASE_NOTES.md \
            --repo "${GITHUB_REPOSITORY}"
          echo "=== Release created: ${TAG} ==="

      # ------------------------------------------------------------------
      # 15. Save caches (always, even on failure, for faster rebuilds).
      # ------------------------------------------------------------------
      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-${{ github.run_id }}

      - name: Save dl cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: openwrt/dl
          key: dlcache-${{ github.run_id }}
